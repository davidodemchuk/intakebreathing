async function insertBatch(table, rows, batchSize = 20) {
  let inserted = 0;
  for (let i = 0; i < rows.length; i += batchSize) {
    const batch = rows.slice(i, i + batchSize);
    const { error } = await supabase.from(table).insert(batch);
    if (error) {
      addLog("  ERROR on batch " + (i/batchSize+1) + ": " + error.message);
      // Try one by one
      for (const row of batch) {
        const { error: e2 } = await supabase.from(table).insert(row);
        if (e2) addLog("  SKIP: " + (row.creator_handle || row.channel || row.title || row.team_member || "?") + " — " + e2.message);
        else inserted++;
      }
    } else {
      inserted += batch.length;
    }
  }
  return inserted;
}

window.runImport = async function() {

  // Partnership Spend
  addLog("\n--- Partnership Spend (" + DATA.partnership_spend.length + " rows) ---");

    pay: r.pay, new_pay: r.new_pay, pl: r.pl, paid_pl: r.paid_pl, platform: r.platform,
    ad_usage: r.ad_usage, organic_views: r.organic_views, ad_views: r.ad_views,
    ad_spend: r.ad_spend, purchase_value: r.purchase_value, roas: r.roas,
    contract: r.contract, content_type: r.content_type, num_videos: r.num_videos ? Math.round(r.num_videos) : null,
    deliverable_met: r.deliverable_met, creator_paid: r.creator_paid,
    creator_name: r.creator_name, creator_email: r.creator_email,
    creator_address: r.creator_address, notes: r.notes,
  }));
  let n = await insertBatch("partnership_spend", psRows);
  addLog("  ✓ " + n + " rows inserted");

  // Monthly Metrics

    ad_views: r.ad_views ? Math.round(r.ad_views) : null, ads_to_lunar: r.ads_to_lunar ? Math.round(r.ads_to_lunar) : null,

  }));
  n = await insertBatch("monthly_metrics", mmRows);

  // SOPs

  addLog("\n=== IMPORT COMPLETE ===");
